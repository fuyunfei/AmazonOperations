<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon PPC 策略框架 Blueprint</title>
<style>
  :root {
    --bg: #f5f4f1;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a18;
    --muted: #6b6b67;

    --gray-fill: #F1EFE8; --gray-stroke: #5F5E5A; --gray-t: #444441; --gray-s: #5F5E5A;
    --purple-fill: #EEEDFE; --purple-stroke: #534AB7; --purple-t: #3C3489; --purple-s: #534AB7;
    --coral-fill: #FAECE7; --coral-stroke: #993C1D; --coral-t: #712B13; --coral-s: #993C1D;
    --teal-fill: #E1F5EE; --teal-stroke: #0F6E56; --teal-t: #085041; --teal-s: #0F6E56;
    --amber-fill: #FAEEDA; --amber-stroke: #854F0B; --amber-t: #633806; --amber-s: #854F0B;
    --row-alt: #f7f6f2; --row-base: #ffffff;
    --arr: #888780;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816; --card: #222220; --border: rgba(255,255,255,0.08);
      --text: #e8e6df; --muted: #9a9890;
      --gray-fill: #444441; --gray-stroke: #B4B2A9; --gray-t: #D3D1C7; --gray-s: #B4B2A9;
      --purple-fill: #3C3489; --purple-stroke: #AFA9EC; --purple-t: #CECBF6; --purple-s: #AFA9EC;
      --coral-fill: #712B13; --coral-stroke: #F0997B; --coral-t: #F5C4B3; --coral-s: #F0997B;
      --teal-fill: #085041; --teal-stroke: #5DCAA5; --teal-t: #9FE1CB; --teal-s: #5DCAA5;
      --amber-fill: #633806; --amber-stroke: #EF9F27; --amber-t: #FAC775; --amber-s: #EF9F27;
      --row-alt: #2a2a28; --row-base: #222220;
      --arr: #B4B2A9;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    padding: 40px 24px 80px;
  }

  header {
    max-width: 900px;
    margin: 0 auto 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  header p { font-size: 13px; color: var(--muted); }

  .section {
    max-width: 900px;
    margin: 0 auto 48px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    overflow: hidden;
  }
  .card + .card { margin-top: 16px; }

  svg { width: 100%; height: auto; display: block; }

  /* SVG color classes */
  .c-gray > rect, .c-gray > circle, .c-gray > ellipse { fill: var(--gray-fill); stroke: var(--gray-stroke); }
  .c-gray .th { fill: var(--gray-t); }  .c-gray .ts { fill: var(--gray-s); }
  .c-purple > rect { fill: var(--purple-fill); stroke: var(--purple-stroke); }
  .c-purple .th { fill: var(--purple-t); } .c-purple .ts { fill: var(--purple-s); }
  .c-coral > rect { fill: var(--coral-fill); stroke: var(--coral-stroke); }
  .c-coral .th { fill: var(--coral-t); } .c-coral .ts { fill: var(--coral-s); }
  .c-teal > rect { fill: var(--teal-fill); stroke: var(--teal-stroke); }
  .c-teal .th { fill: var(--teal-t); } .c-teal .ts { fill: var(--teal-s); }
  .c-amber > rect { fill: var(--amber-fill); stroke: var(--amber-stroke); }
  .c-amber .th { fill: var(--amber-t); } .c-amber .ts { fill: var(--amber-s); }

  /* table rows inside SVG */
  rect.row-alt { fill: var(--row-alt); stroke: var(--border); }
  rect.row-base { fill: var(--row-base); stroke: var(--border); }

  .th { font-size: 14px; font-weight: 600; fill: var(--text); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--muted); }
  .arr { stroke: var(--arr); stroke-width: 1.5; fill: none; }

  line.dashed { stroke: var(--arr); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
</style>
</head>
<body>

<header>
  <h1>Amazon PPC 策略框架 Blueprint</h1>
  <p>顶层目标 → 推导链 → 唯一锚点 → 执行系统</p>
</header>

<div class="section">

  <div class="card">

<!-- L0: 真实目标 -->
<g class="c-purple">
  <rect x="160" y="20" width="360" height="52" rx="4" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">maximize 利润</text>

<line x1="170" y1="140" x2="170" y2="164" class="arr" marker-end="url(#ag)"/>
<line x1="510" y1="140" x2="510" y2="164" class="arr" marker-end="url(#ag)"/>

</g>
<g class="c-gray">
  <rect x="380" y="164" width="260" height="56" rx="4" stroke-width="0.5"/>
  <text class="th" x="510" y="182" text-anchor="middle" dominant-baseline="central">效率约束</text>

</g>
<line x1="170" y1="220" x2="170" y2="244" class="arr" marker-end="url(#ag)"/>
<line x1="510" y1="220" x2="510" y2="244" class="arr" marker-end="url(#ag)"/>

  <text class="th" x="170" y="262" text-anchor="middle" dominant-baseline="central">每次点击的价值上限</text>

<g class="c-gray">

<line x1="340" y1="392" x2="340" y2="416" class="arr" marker-end="url(#ag)"/>

</g>

<line x1="40" y1="478" x2="640" y2="478" stroke="var(--border)" stroke-width="0.5"/>

<!-- 系统级 KPI -->
<text class="th" x="340" y="502" text-anchor="middle">系统级 KPI — 判断整体是否朝目标方向走</text>

<g class="c-teal">

</g>

<line x1="40" y1="598" x2="640" y2="598" stroke="var(--border)" stroke-width="0.5"/>

  <text class="th" x="127" y="656" text-anchor="middle" dominant-baseline="central">Price ↑</text>
  <text class="ts" x="127" y="674" text-anchor="middle" dominant-baseline="central">涨价，提高点击价值</text>

</g>
<g class="c-teal">

<!-- TACoS 陷阱提示 -->

  <rect x="40" y="750" width="600" height="24" rx="4" stroke-width="0.5"/>
  <text class="ts" x="340" y="762" text-anchor="middle" dominant-baseline="central">陷阱：部分品类自然流量天花板低，TACoS 永远不会大幅下降 → 广告是永久成本，不是投资</text>
</g>
</svg>
  </div>
</div>
